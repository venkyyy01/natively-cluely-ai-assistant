<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Natively Shell</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #loading-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.5);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #loading-indicator.hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="stealth-shell-canvas"></canvas>
    <div id="loading-indicator">Loading...</div>
  </body>
</html>
