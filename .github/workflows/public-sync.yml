name: Sync to Public Repository

on:
  push:
    branches:
      - main
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Remove Premium Features & Secrets
        run: |
          echo "Purging premium features..."
          rm -rf premium/
          rm -f .env*
          
      - name: Verify Open-Source Build Integrity
        run: |
          npm ci
          npm run verify:production
          npm audit --audit-level=high
          npx vite build
          
      - name: Sync to Public Repository
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$PUBLIC_REPO_PAT" ]; then
            echo "Error: PUBLIC_REPO_PAT secret is missing. Please add it to your repository secrets."
            exit 1
          fi

          # Setup Git for committing to the public repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Clone the public repository
          git clone https://$PUBLIC_REPO_PAT@github.com/evinjohnn/natively-cluely-ai-assistant.git public-repo
          
          # Sync files from the current (sanitized) workspace to the public repo clone
          # We exclude .git, the clone folder itself, and build outputs
          rsync -av --delete \
            --exclude '.git' \
            --exclude 'public-repo' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'dist-electron' \
            --exclude 'release' \
            --exclude 'native-module/target' \
            --exclude '.github/workflows/public-sync.yml' \
            --exclude '.github/workflows/public-sync.yml' \
            ./ public-repo/
            
          cd public-repo
          
          # Check if there are changes to commit
          git add .
          if git diff --staged --quiet; then
             echo "No changes to sync."
          else
             git commit -m "$COMMIT_MESSAGE" -m "Auto-sync from private repo: ${{ github.sha }}"
             git push --force origin HEAD:main
             echo "Successfully synced to public repository."
          fi
